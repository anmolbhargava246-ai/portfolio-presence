name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies (freelance / React)
        run: npm install

      - name: Build freelance site (React) → dist/
        run: npm run build

      - name: Install Dependencies (full-time / Astro)
        run: npm install
        working-directory: full-time

      - name: Build full-time site (Astro) → full-time/dist/
        run: npm run build
        working-directory: full-time

      - name: Merge full-time build into dist/full-time/
        run: |
          mkdir -p dist/full-time
          cp -r full-time/dist/. dist/full-time/

      - name: Copy index.html to 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
